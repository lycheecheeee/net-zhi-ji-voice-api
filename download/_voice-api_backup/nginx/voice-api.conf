# Nginx 配置 - Net 知己語音 API
# 
# 安裝位置：/etc/nginx/conf.d/voice-api.conf
# 或：/etc/nginx/sites-available/voice-api.conf
# 
# 使用方式：
# sudo cp nginx/voice-api.conf /etc/nginx/conf.d/
# sudo nginx -t && sudo systemctl reload nginx

# 上游服務器配置
upstream voice_api_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;  # 替換為你的域名

    # Let's Encrypt 驗證路徑
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他請求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 服務器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourdomain.com;  # 替換為你的域名

    # SSL 證書配置（Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 安全頭
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日誌
    access_log /var/log/nginx/voice-api.access.log;
    error_log /var/log/nginx/voice-api.error.log;

    # 請求體大小限制（用於音頻上傳）
    client_max_body_size 50m;
    client_body_buffer_size 1m;

    # 代理配置
    location / {
        proxy_pass http://voice_api_backend;
        proxy_http_version 1.1;

        # 代理頭設置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超時設置（音頻處理可能需要較長時間）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 緩衝設置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 健康檢查端點（無需認證）
    location /health {
        proxy_pass http://voice_api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;  # 健康檢查不記錄日誌
    }

    # Rate limiting 區域定義（在 nginx.conf 中定義）
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # 
    # 應用速率限制
    # location /api/ {
    #     limit_req zone=api_limit burst=20 nodelay;
    #     proxy_pass http://voice_api_backend;
    # }
}
