version: '3.8'

services:
  voice-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: net-zhi-ji-voice-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
